<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .age {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 2rem;
        }
        .carousel {
            position: relative;
            width: 500px;
            height: 350px;
            margin: 0 auto 2rem;
            border-radius: 12px;
            overflow: hidden;
        }
        .carousel img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .carousel img.active {
            opacity: 1;
        }
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
        }
        .dot.active {
            background: #fff;
        }
        .contact {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <main>
        <div class="carousel">
            <img src="i1.jpg" class="active">
            <img src="i2.jpg">
            <img src="i3.jpg">
            <div class="carousel-dots">
                <span class="dot active" onclick="showSlide(0)"></span>
                <span class="dot" onclick="showSlide(1)"></span>
                <span class="dot" onclick="showSlide(2)"></span>
            </div>
        </div>
        <h1>Timur</h1>
        <p class="tagline">Строительство · ИИ-разработка</p>
        <p class="age">17 лет</p>
        <div class="contact">
            <a href="mailto:test@gmail.com">test@gmail.com</a>
        </div>
    </main>
    <script>
        let current = 0;
        const images = document.querySelectorAll('.carousel img');
        const dots = document.querySelectorAll('.dot');
        function showSlide(n) {
            images[current].classList.remove('active');
            dots[current].classList.remove('active');
            current = (n + images.length) % images.length;
            images[current].classList.add('active');
            dots[current].classList.add('active');
        }
        setInterval(() => showSlide(current + 1), 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .age {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 2rem;
        }
        .contact {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }
        a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <main>
        <h1>Timur</h1>
        <p class="tagline">Строительство · ИИ-разработка</p>
        <p class="age">17 лет</p>
        <div class="contact">
            <a href="mailto:test@gmail.com">test@gmail.com</a>
        </div>
    </main>
</body>
</html>
